<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exam-Killer · 期末复习资料生成</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css" media="print" onload="this.media='all'">
  <link rel="stylesheet" href="css/style.css">
  <script defer src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>

<body>
  <nav id="topbar">
    <div class="topbar-container">
      <a href="#/" class="logo">
        <div class="logo-icon">
          <i data-lucide="brain-circuit"></i>
        </div>
        <span>Exam-Killer</span>
      </a>
      <div class="topbar-links">
        <a href="#/settings" class="topbar-link">
          <i data-lucide="settings" style="width: 14px; height: 14px; vertical-align: middle; margin-right: 4px;"></i>
          设置
        </a>
      </div>
    </div>
  </nav>

  <div class="app-wrapper">
    <main id="app"></main>
  </div>

  <div id="toast-container"></div>

  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
  <script defer src="js/api.js"></script>
  <script defer src="js/config.js"></script>
  <script defer src="js/router.js"></script>
  <script defer src="js/settings.js"></script>
  <script defer src="js/renderer.js"></script>
  <script defer src="js/courses.js"></script>
  <script defer src="js/upload.js"></script>
  <script defer src="js/course-detail.js"></script>
  <script defer src="js/question-bank.js"></script>
  <script defer src="js/review-guide.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      router.init();
      lucide.createIcons();
      window.addEventListener('hashchange', () => {
        setTimeout(() => lucide.createIcons(), 50);
      });
      window.toast = (msg, type = 'info') => {
        const container = document.getElementById('toast-container');
        const t = document.createElement('div');
        t.className = `toast toast-${type} fade-in`;
        const icon = type === 'error' ? 'alert-circle' : 'check-circle';
        t.innerHTML = `
          <i data-lucide="${icon}" style="width:18px;height:18px;"></i>
          <div class="toast-content">${msg}</div>
        `;
        container.appendChild(t);
        lucide.createIcons();
        setTimeout(() => {
          t.style.opacity = '0';
          t.style.transform = 'translateY(-10px) scale(0.95)';
          setTimeout(() => t.remove(), 400);
        }, 3000);
      };
      window.showConfirm = (message) => {
        return new Promise((resolve) => {
          const overlay = document.createElement('div');
          overlay.className = 'modal-overlay';
          overlay.innerHTML = `
            <div class="modal-dialog">
              <div class="modal-message">${message}</div>
              <div class="modal-actions">
                <button class="btn btn-secondary btn-cancel">取消</button>
                <button class="btn btn-primary btn-confirm">确定</button>
              </div>
            </div>
          `;
          document.body.appendChild(overlay);
          overlay.querySelector('.btn-cancel').focus();
          const close = (result) => { document.body.removeChild(overlay); resolve(result); };
          overlay.querySelector('.btn-confirm').addEventListener('click', () => close(true));
          overlay.querySelector('.btn-cancel').addEventListener('click', () => close(false));
          overlay.addEventListener('click', (e) => { if (e.target === overlay) close(false); });
        });
      };

      window.showPrompt = (message, placeholder = '') => {
        return new Promise((resolve) => {
          const overlay = document.createElement('div');
          overlay.className = 'modal-overlay';
          overlay.innerHTML = `
            <div class="modal-dialog">
              <div class="modal-message">${message}</div>
              <input class="modal-input" placeholder="${placeholder}" autofocus>
              <div class="modal-actions">
                <button class="btn btn-secondary btn-cancel">取消</button>
                <button class="btn btn-primary btn-confirm">确定</button>
              </div>
            </div>
          `;
          document.body.appendChild(overlay);
          const input = overlay.querySelector('.modal-input');
          input.focus();
          input.addEventListener('keydown', (e) => { if (e.key === 'Enter') confirm(); });
          const close = (result) => { document.body.removeChild(overlay); resolve(result); };
          const confirm = () => { const val = input.value.trim(); if (val) close(val); };
          overlay.querySelector('.btn-confirm').addEventListener('click', confirm);
          overlay.querySelector('.btn-cancel').addEventListener('click', () => close(null));
          overlay.addEventListener('click', (e) => { if (e.target === overlay) close(null); });
        });
      };
    });
  </script>
</body>
</html>
